name: Publish Approved PRs

on:
  pull_request_review:
    types: [submitted]

concurrency:
  group: publish-approved-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  check:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    outputs:
      has-permissions: ${{ steps.checkPermissions.outputs.require-result }}
    steps:
      - name: Check permissions
        id: checkPermissions
        uses: actions-cool/check-user-permission@v2
        with:
          require: write

  publish:
    needs: check
    if: needs.check.outputs.has-permissions == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build:all

      - name: Install pkg-pr-new
        run: npm install -g pkg-pr-new

      - name: Publish to pkg.pr.new
        run: pkg-pr-new publish --commentWithSha
