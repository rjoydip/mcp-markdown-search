name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - run: bun install
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run format:check
      - run: bun test --coverage --coverage-reporter=text --coverage-reporter=lcov tests/

  integration:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - run: bun install

      - name: Start dev server (remote)
        id: dev-server
        continue-on-error: true
        run: |
          wrangler dev --var MCP_SECRET:ci-secret &
          echo "pid=$!" >> "$GITHUB_OUTPUT"
          timeout 60 bash -c 'until curl -sf http://localhost:8787/health; do sleep 2; done'

      - name: Run MCP integration tests
        if: steps.dev-server.outcome == 'success'
        env:
          WORKER_URL: http://localhost:8787
          MCP_SECRET: ci-secret
        run: bun test tests/mcp-worker.test.ts

      - name: Stop dev server
        if: always()
        run: kill ${{ steps.dev-server.outputs.pid }} 2>/dev/null || true
