name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read
  statuses: write

jobs:
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.ci.outputs.sha || github.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - id: ci
        run: |
          bun install --frozen-lockfile
          bun run lint
          bun run typecheck
          bun test
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.ci-gate.outputs.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: |
          mkdir -p dist
          bun run build
          bun run build:cli

      - name: Unit Test
        run: bun test

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries
          path: dist/*
          retention-days: 5

  preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    needs: [ci-gate, build]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.ci-gate.outputs.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Deploy Preview
        id: deploy
        continue-on-error: true
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env preview
          secrets: |
            MCP_SECRET
        env:
          MCP_SECRET: ${{ secrets.MCP_SECRET }}

      - name: Update PR Description with Preview URL
        if: always()
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL || 'Deploy failed';
            const prNumber = '${{ github.event.pull_request.number }}';
            const sha = '${{ needs.ci-gate.outputs.sha }}';

            core.info(`Updating PR #${prNumber} description with preview URL: ${previewUrl}`);

            const previewSection = '\n\n---\n\n## Preview Deployment\n' +
              '\n' +
              '**Commit:** `' + sha + '`\n' +
              '\n' +
              '**Worker Preview:** ' + previewUrl + '\n' +
              '\n' +
              '<details>\n' +
              '<summary>Quick Test</summary>\n' +
              '\n' +
              '```bash\n' +
              'curl ' + previewUrl + '/health\n' +
              'curl -X POST ' + previewUrl + '/search -H "Content-Type: application/json" -H "X-MCP-Secret: $MCP_SECRET" -d \'{"query":"test","topK":1}\'\n' +
              '```\n' +
              '\n' +
              '</details>';

            try {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: parseInt(prNumber),
              });

              let body = pr.data.body || '';
              const marker = '## Preview Deployment';

              if (body.includes(marker)) {
                body = body.replace(/---\n\n## Preview Deployment[\s\S]*$/, '');
                body = body.trimEnd();
              }

              body += previewSection;

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: parseInt(prNumber),
                body,
              });
              core.info('PR description updated with preview URL');
            } catch (error) {
              core.setFailed(`PR description update failed: ${error.message}`);
            }

      - name: MCP Health Check
        id: mcp-health
        if: steps.deploy.outcome == 'success'
        env:
          WORKER_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          echo "Checking MCP health at $WORKER_URL/health"
          curl -sSf "$WORKER_URL/health" | jq -e '.status == "ok"'

      - name: MCP Integration Test
        id: mcp-test
        if: steps.deploy.outcome == 'success'
        env:
          WORKER_URL: ${{ steps.deploy.outputs.deployment-url }}
          MCP_SECRET: ${{ secrets.MCP_SECRET }}
        run: bun test tests/mcp-worker.test.ts

      - name: Comment MCP Test Results
        if: steps.deploy.outcome == 'success' && always()
        env:
          MCP_TEST_RESULT: ${{ steps.mcp-test.outcome }}
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const result = process.env.MCP_TEST_RESULT || 'skipped';
            const previewUrl = process.env.PREVIEW_URL;
            const commentBody = '## MCP Test Results\n\n' +
              '**Status:** ' + (result === 'success' ? '✅ Passed' : '❌ Failed') + '\n' +
              '**Worker:** ' + previewUrl + '\n' +
              '\n' +
              '<details>\n' +
              '<summary>Test Details</summary>\n' +
              '\n' +
              'The MCP integration test validates the deployed Worker endpoints:\n' +
              '- `GET /` — service metadata\n' +
              '- `GET /health` — health check\n' +
              '- `POST /search` — auth, validation, valid request\n' +
              '- `POST /index` — auth, validation, valid request\n' +
              '\n' +
              '</details>';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body?.includes('MCP Test Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }

      - name: Mark MCP Test Status
        if: steps.deploy.outcome == 'success' && always()
        env:
          MCP_TEST_RESULT: ${{ steps.mcp-test.outcome }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const result = process.env.MCP_TEST_RESULT === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: result,
              context: 'MCP Integration Test',
              description: result === 'success' ? 'MCP endpoints verified' : 'MCP test failed',
              target_url: 'https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
            });
