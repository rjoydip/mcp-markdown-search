name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read
  statuses: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: |
          mkdir -p dist
          bun run build
          bun run build:cli

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries
          path: dist/*
          retention-days: 5

  preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Deploy Preview
        id: deploy
        continue-on-error: true
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env preview
          secrets: |
            MCP_SECRET
        env:
          MCP_SECRET: ${{ secrets.MCP_SECRET }}

      - name: Update PR Description with Preview URL
        if: always()
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL || 'Deploy failed';
            const prNumber = '${{ github.event.pull_request.number }}';
            const sha = '${{ github.sha }}';

            core.info(`Updating PR #${prNumber} description with preview URL: ${previewUrl}`);

            const previewSection = '\n\n---\n\n## Preview Deployment\n' +
              '\n' +
              '**Commit:** `' + sha + '`\n' +
              '\n' +
              '**Worker Preview:** ' + previewUrl + '\n' +
              '\n' +
              '<details>\n' +
              '<summary>Quick Test</summary>\n' +
              '\n' +
              '```bash\n' +
              'curl ' + previewUrl + '/health\n' +
              '```\n' +
              '\n' +
              '</details>';

            try {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: parseInt(prNumber),
              });

              let body = pr.data.body || '';
              const marker = '## Preview Deployment';

              if (body.includes(marker)) {
                body = body.replace(/---\n\n## Preview Deployment[\s\S]*$/, '');
                body = body.trimEnd();
              }

              body += previewSection;

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: parseInt(prNumber),
                body,
              });
              core.info('PR description updated with preview URL');
            } catch (error) {
              core.setFailed(`PR description update failed: ${error.message}`);
            }
