name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.ci.outputs.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - id: ci
        run: |
          bun install --frozen-lockfile
          bun run lint
          bun run typecheck
          bun test
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.ci-gate.outputs.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: |
          mkdir -p dist
          bun run build
          bun run build:cli

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*
          retention-days: 5

  preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    needs: [ci-gate, build]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.ci-gate.outputs.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Deploy Preview
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env preview
          secrets: |
            MCP_SECRET
        env:
          MCP_SECRET: ${{ secrets.MCP_SECRET }}

      - name: Get preview URL
        id: url
        run: |
          WORKER_NAME="mcp-markdown-search-preview"
          ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          URL="https://${WORKER_NAME}.${ACCOUNT_ID}.workers.dev"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Find PR Number
        id: pr
        if: github.event_name == 'pull_request'
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.url.outputs.url }}';
            const prNumber = '${{ steps.pr.outputs.number }}';
            const sha = '${{ needs.ci-gate.outputs.sha }}';

            const body = '## Preview Deployment\n' +
              '\n' +
              '**Commit:** ' + sha + '\n' +
              '\n' +
              '**Worker Preview:** ' + previewUrl + '\n' +
              '\n' +
              '<details>\n' +
              '<summary>Quick Test</summary>\n' +
              '\n' +
              '```bash\n' +
              'curl ' + previewUrl + '/health\n' +
              'curl -X POST ' + previewUrl + '/search -H "Content-Type: application/json" -H "X-MCP-Secret: $MCP_SECRET" -d \'{"query":"test","topK":1}\'\n' +
              '```\n' +
              '\n' +
              '</details>\n' +
              '\n' +
              '---\n' +
              '_Deployed automatically from CI_';

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(prNumber),
            });

            const existingComment = comments.data.find(c =>
              c.body.includes('## Preview Deployment')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(prNumber),
                body: body,
              });
            }

      - name: Update Commit Status
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.url.outputs.url }}';
            const sha = '${{ needs.ci-gate.outputs.sha }}';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: sha,
              state: 'success',
              target_url: previewUrl,
              description: 'Preview available',
              context: 'preview/deploy',
            });

  publish-packages:
    name: Publish Packages
    runs-on: ubuntu-latest
    needs: [ci-gate, build]
    # if: github.event_name == 'push'
    outputs:
      sha: ${{ steps.ci.outputs.sha }}
      url: ${{ steps.publish.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.ci-gate.outputs.sha }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries

      - id: ci
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install pkg.pr.new
        run: npm install -g pkg.pr.new

      - name: Publish to pkg.pr.new
        id: publish
        run: |
          URL=$(npx pkg.pr.new publish './mcp-markdown-search*' --no-compact --comment=update 2>&1 | tee /dev/stderr | grep -o 'https://pkg.pr.new/[^ ]*' | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Update Commit Status
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ needs.ci-gate.outputs.sha }}';
            const url = '${{ steps.publish.outputs.url }}';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: sha,
              state: 'success',
              target_url: url || 'https://pkg.pr.new',
              description: 'Package available at pkg.pr.new',
              context: 'pkg.pr.new/publish',
            });
